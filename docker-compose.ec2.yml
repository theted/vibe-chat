# EC2 production compose file.
#
# Differences from docker-compose.prod.yml:
#   - Redis and Chroma have no profiles: they always start (self-contained instance).
#   - Nginx exposes port 8080 on localhost; host nginx routes external traffic to it
#     based on hostname. Server and client use expose (docker-internal only) which
#     is correct: all external access flows through the nginx service below.
#
# Deploy: docker compose -f docker-compose.ec2.yml --env-file .env up -d --build

services:
  redis:
    image: redis:7.4-alpine
    container_name: ai-chat-redis-prod
    command: redis-server --save 60 1 --appendonly yes --loglevel warning
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - ai-chat-network

  chroma:
    image: chromadb/chroma:latest
    container_name: ai-chat-chroma-prod
    restart: always
    networks:
      - ai-chat-network
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-chat-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: ai-chat-server-prod
    # expose makes port available within the docker network only.
    # External traffic reaches the server via the nginx service below.
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - CLIENT_URL=${CLIENT_URL:-*}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - Z_API_KEY=${Z_API_KEY}
      - LLAMA_API_KEY=${LLAMA_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-}
      - OPENROUTER_APP_URL=${OPENROUTER_APP_URL:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - AI_CHAT_VERBOSE_CONTEXT=${AI_CHAT_VERBOSE_CONTEXT:-false}
      - AI_CHAT_ENABLE_PERSONAS=${AI_CHAT_ENABLE_PERSONAS:-false}
      - AI_CHAT_SKIP_HEALTHCHECK=${AI_CHAT_SKIP_HEALTHCHECK:-false}
      - AI_CHAT_RECHECK_AVAILABILITY=${AI_CHAT_RECHECK_AVAILABILITY:-false}
      - AI_CHAT_USE_LAST_WORKING=${AI_CHAT_USE_LAST_WORKING:-false}
      - AI_CHAT_TRY_MERGE=${AI_CHAT_TRY_MERGE:-false}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CHAT_ASSISTANT_SCRIPT=/app/scripts/run-mcp-chat.js
      - CHAT_ASSISTANT_AUTO_INDEX=true
      - NODE_PATH=/app/server/node_modules
      - CHROMA_URL=${CHROMA_URL:-http://chroma:8000}
      - CHAT_ASSISTANT_COLLECTION=ai-chat-workspace
    volumes:
      - ./packages/ai-chat-cli/dist/scripts:/app/scripts:ro
      - ./packages/mcp-assistant/src:/app/mcp-assistant/src:ro
      - ./startup-log.json:/app/startup-log.json
    restart: always
    networks:
      - ai-chat-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ai-chat-client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      args:
        - VITE_SERVER_URL=${SERVER_URL:-http://localhost:3001}
    container_name: ai-chat-client-prod
    # expose makes port available within the docker network only.
    # External traffic reaches the client via the nginx service below.
    expose:
      - "80"
    depends_on:
      - ai-chat-server
    restart: always
    networks:
      - ai-chat-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reverse proxy: routes /api, /socket.io → server; everything else → client.
  # Bound to 127.0.0.1:8080 so host nginx can route external traffic by hostname
  # (see deploy/nginx/ec2-vibe-chat.nginx.conf). To add another service on the
  # same EC2, run its compose stack on a different localhost port and add a new
  # server block in host nginx.
  nginx:
    image: nginx:alpine
    container_name: ai-chat-nginx-prod
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ai-chat-server
      - ai-chat-client
    restart: always
    networks:
      - ai-chat-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  ai-chat-network:
    driver: bridge

volumes:
  redis-data:
  chroma-data:
