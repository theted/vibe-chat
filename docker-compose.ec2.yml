# EC2 production override.
#
# Differences from docker-compose.prod.yml:
#   - Redis and Chroma have no profiles and publish no host ports: they always
#     start as part of this self-contained stack.
#   - Nginx exposes port 8080 on localhost; host nginx routes external traffic
#     to it based on hostname (see deploy/nginx/ec2-vibe-chat.nginx.conf).
#
# Deploy: docker compose -f docker-compose.base.yml -f docker-compose.ec2.yml --env-file .env up -d --build

services:
  redis:
    container_name: ai-chat-redis-prod
    restart: always

  chroma:
    container_name: ai-chat-chroma-prod
    restart: always

  ai-chat-server:
    container_name: ai-chat-server-prod
    # Docker-network only; external traffic flows through the nginx service
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
    volumes:
      - ./model-health.json:/app/model-health.json
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ai-chat-client:
    container_name: ai-chat-client-prod
    expose:
      - "80"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reverse proxy bound to 127.0.0.1:8080 so host nginx can route external
  # traffic by hostname. To add another service on the same EC2, run its
  # compose stack on a different localhost port and add a host nginx block.
  nginx:
    image: nginx:alpine
    container_name: ai-chat-nginx-prod
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ai-chat-server
      - ai-chat-client
    restart: always
    networks:
      - ai-chat-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
