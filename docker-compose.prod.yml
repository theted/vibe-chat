# Production override — services behind the bundled nginx reverse proxy.
# Run: docker compose -f docker-compose.base.yml -f docker-compose.prod.yml up

services:
  redis:
    container_name: ai-chat-redis-prod
    profiles:
      - internal-redis
    ports:
      - "6379:6379"
    restart: always

  chroma:
    container_name: ai-chat-chroma-prod
    profiles:
      - internal-chroma
    ports:
      - "8000:8000"
    restart: always

  ai-chat-server:
    container_name: ai-chat-server-prod
    # Docker-network only; external traffic flows through the nginx service
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
    volumes:
      - ./model-health.json:/app/model-health.json
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ai-chat-client:
    container_name: ai-chat-client-prod
    expose:
      - "80"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reverse proxy: routes /api, /socket.io → server; everything else → client.
  # Exposed only on localhost so the host nginx can proxy based on hostname.
  nginx:
    image: nginx:alpine
    container_name: ai-chat-nginx-prod
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ai-chat-server
      - ai-chat-client
    restart: always
    networks:
      - ai-chat-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
