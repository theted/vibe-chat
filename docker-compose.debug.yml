# Debug override — simpler setup for troubleshooting.
# Run: docker compose -f docker-compose.base.yml -f docker-compose.debug.yml up

services:
  redis:
    container_name: ai-chat-redis-debug
    profiles:
      - internal-redis
    ports:
      - "6379:6379"

  chroma:
    container_name: ai-chat-chroma-debug
    profiles:
      - internal-chroma
    ports:
      - "8000:8000"

  ai-chat-server:
    container_name: ai-chat-server-debug
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    volumes:
      - ./model-health.json:/app/model-health.json

  ai-chat-client:
    build:
      dockerfile: packages/client/Dockerfile.simple
    container_name: ai-chat-client-debug
    ports:
      - "3000:3000"
    environment:
      - VITE_SERVER_URL=http://localhost:3001
