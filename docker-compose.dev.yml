# Development override (live reloading).
# Run: docker compose -f docker-compose.base.yml -f docker-compose.dev.yml up

services:
  redis:
    container_name: ai-chat-redis-dev
    profiles:
      - internal-redis
    ports:
      - "6379:6379"

  chroma:
    container_name: ai-chat-chroma-dev
    profiles:
      - internal-chroma
    ports:
      - "8000:8000"

  ai-chat-server:
    build:
      dockerfile: packages/server/Dockerfile.dev
    container_name: ai-chat-server-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    volumes:
      - ./packages/server/src:/app/server/src
      - ./packages/ai-chat-core/src:/app/ai-chat-core/src
      - ./packages/client/src:/app/client/src:ro
      - ./packages/server/package.json:/app/server/package.json
      - ./packages/server/tsconfig.json:/app/server/tsconfig.json
      - ./model-health.json:/app/server/model-health.json

  ai-chat-client:
    build:
      dockerfile: packages/client/Dockerfile.dev
    container_name: ai-chat-client-dev
    ports:
      - "3000:3000"
    environment:
      - VITE_SERVER_URL=http://localhost:3001
    volumes:
      - ./packages/client/src:/app/src
      - ./packages/client/package.json:/app/package.json
      - ./packages/client/vite.config.js:/app/vite.config.js
      - ./packages/client/index.html:/app/index.html
      - ./constants.ts:/app/constants.ts
