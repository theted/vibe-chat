# Host-level nginx site config for vibe-chat on a shared EC2 instance.
#
# Install: sudo ln -s /opt/vibe-chat/deploy/nginx/ec2-vibe-chat.nginx.conf \
#                      /etc/nginx/sites-enabled/vibe-chat
#
# Other services on the same EC2 get their own server blocks pointing to
# different localhost ports (e.g. 127.0.0.1:9090), enabling hostname-based routing.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name YOUR_DOMAIN;  # e.g. chat.example.com

  # Redirect HTTP → HTTPS once a cert is set up (uncomment when ready):
  # return 301 https://$host$request_uri;

  location / {
    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;

    # WebSocket support (socket.io)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}

